<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지인 추천 이벤트</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
    }

    .wrapper {
      position: relative;
      width: 100%;
      max-width: 500px;
    }

    .wrapper img {
      width: 100%;
      display: block;
    }

    /* 투명 클릭 오버레이 버튼 공통 */
    .btn-overlay {
      position: absolute;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 10;
    }

    /* STEP 1 - 링크 복사하기 버튼 (파란 버튼) */
    .btn-step1 {
      top: 44.5%;
      left: 58%;
      width: 39%;
      height: 2.2%;
    }

    /* 하단 큰 링크 복사하기 버튼 */
    .btn-bottom {
      top: 87.4%;
      left: 4%;
      width: 92%;
      height: 3.2%;
    }

    /* 복사 완료 토스트 메시지 */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(0,0,0,0.75);
      color: #fff;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 15px;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      white-space: nowrap;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <img src="event.png" alt="지인 추천 이벤트">

    <!-- STEP 1 링크 복사하기 버튼 오버레이 -->
    <button class="btn-overlay btn-step1" onclick="copyLink()" aria-label="링크 복사하기"></button>

    <!-- 하단 큰 링크 복사하기 버튼 오버레이 -->
    <button class="btn-overlay btn-bottom" onclick="copyLink()" aria-label="링크 복사하기"></button>
  </div>

  <div class="toast" id="toast">링크가 복사되었습니다!</div>

  <script>
    function copyLink() {
      const referralLink = 'https://sikdae.typeform.com/recommendevent?&utm_source=corp&utm_medium=corp&utm_campaign=consultation&utm_content=event&utm_term=recommend';

      navigator.clipboard.writeText(referralLink).then(function() {
        showToast();
      }).catch(function() {
        const textarea = document.createElement('textarea');
        textarea.value = referralLink;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showToast();
      });
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(function() {
        toast.classList.remove('show');
      }, 2000);
    }
  </script>
</body>
</html>
